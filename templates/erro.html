{% extends "base.html" %}
{% block title %}Erro{% endblock %}

{% block layout %}
<div class="page-center">
  <div class="page-box">
    <div class="page-icon-wrap error-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
    <h1 class="page-center-title">Algo deu errado</h1>
    <p class="page-center-desc">{{ msg }}</p>
    <a href="javascript:history.back()" class="btn btn-outline">Tentar novamente</a>
  </div>
</div>
{% endblock %}
